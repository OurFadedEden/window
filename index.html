<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Window Maker — 커버 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  @font-face {
    font-family: 'DungGeunMo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/DungGeunMo.woff') format('woff');
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:none; }
  html,body { min-height:100%; font-family:'Galmuri11', sans-serif; background:#EFE9DD; color:#5E6E72; }

  /* ── 전체 레이아웃: 항상 PC 2-컬럼 ── */
  .app {
    display: flex;
    flex-wrap: nowrap;
    gap: 24px;
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
    align-items: flex-start;
    min-width: 900px; /* 모바일에서도 PC 레이아웃 유지 */
  }
  .preview-col {
    flex: 1 1 480px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    position: sticky;
    top: 24px;
    align-self: flex-start;
  }
  .control-col { flex: 0 0 340px; display: flex; flex-direction: column; gap: 14px; }

  h1 { font-family:'Galmuri9', sans-serif; font-size:18px; letter-spacing:2px; text-align:center; color:#5E6E72; text-shadow:1px 1px 0 #fff; }
  .cover-wrap { width:100%; max-width:560px; border:2px dashed #BFC9C5; border-radius:14px; padding:14px; background:#fff; display:flex; justify-content:center; }

  /* ─── 커버 본체 ─────────────────────────────────────────── */
  #cover {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    border-radius: 8px;
    font-family: var(--font-main, 'Galmuri11'), sans-serif;
    background-color: var(--sky-bottom);
    background-image: var(--bg-image, linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 35%, var(--sky-bottom) 100%));
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default; /* 커서 제거 */
    user-select: none;
  }

  /* 비네트 */
  .fade-overlay { position:absolute; inset:0; pointer-events:none; z-index:5; background:radial-gradient(ellipse at center,rgba(255,255,255,0) 45%,rgba(120,110,95,0.20) 100%); opacity:0.5; mix-blend-mode:multiply; }

  /* 버블 */
  .bubble { position:absolute; bottom:-40px; border-radius:50%; background:var(--bubble-bg); border:2px solid var(--bubble-border); animation:rise linear infinite; z-index:1; }
  @keyframes rise { 0%{transform:translateY(0) translateX(0);opacity:0} 10%{opacity:.8} 100%{transform:translateY(-120vh) translateX(20px);opacity:0} }

  /* 타이틀 */
  .eden-title { position:relative; z-index:6; text-align:center; color:var(--text); text-shadow:2px 2px 0 rgba(255,255,255,.5); margin-bottom:1%; }
  .eden-title .en { font-family:'Galmuri9', sans-serif; font-size:3.6vw; letter-spacing:3px; }
  .eden-title .kr { margin-top:0.3%; font-size:1.25vw; letter-spacing:2px; color:var(--text-soft); }

  /* 메인 윈도우 */
  .win98 {
    position: relative; z-index:6;
    width: 60%; max-width: 380px;
    background: var(--base);
    border: 3px solid var(--accent);
    border-radius: 18px;
    box-shadow: 0 6px 0 var(--win98-shadow1), 0 0 0 5px var(--base-light), 0 0 0 8px var(--accent);
    overflow: hidden;
  }
  .title-bar { display:flex; align-items:center; justify-content:space-between; padding:1.1% 2%; background:linear-gradient(120deg,var(--accent-light) 0%,var(--accent) 100%); color:#F8F5EE; font-family:'Galmuri9',sans-serif; font-size:1.5vw; letter-spacing:1px; text-shadow:1px 1px 0 rgba(80,90,90,.35); }
  .title-buttons { display:flex; gap:4px; }
  .title-buttons span { display:inline-flex; align-items:center; justify-content:center; width:16px; height:14px; background:var(--base); color:var(--accent); border-radius:5px; font-size:9px; cursor:pointer; }

  .win98-body { padding:1.8% 2%; display:flex; flex-direction:column; gap:1.2%; }
  .photo-frame { width:100%; aspect-ratio:2/1; border-radius:12px; border:3px dashed var(--accent-base); background-color:#E8E2D5; background-image:var(--photo,none); background-size:cover; background-position:center; position:relative; overflow:hidden; }
  .photo-frame.fx-faded { filter:sepia(35%) saturate(70%) brightness(1.05) contrast(95%); }
  .photo-frame.fx-glitch::before,.photo-frame.fx-glitch::after { content:""; position:absolute; inset:0; background-image:inherit; background-size:cover; background-position:center; mix-blend-mode:screen; }
  .photo-frame.fx-glitch::before { background-color:rgba(255,0,90,.35); animation:glitch1 2.6s infinite linear; }
  .photo-frame.fx-glitch::after { background-color:rgba(0,210,255,.3); animation:glitch2 2.6s infinite linear; }
  .photo-frame.fx-glitch>.scan { position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(to bottom,rgba(255,255,255,.08) 0px,rgba(255,255,255,.08) 1px,transparent 2px,transparent 4px); animation:scan-move 6s linear infinite; mix-blend-mode:overlay; }
  @keyframes scan-move { from{background-position:0 0} to{background-position:0 60px} }
  @keyframes glitch1 { 0%,88%,100%{transform:translate(0,0);opacity:0} 90%{transform:translate(-4px,2px);opacity:.5} 93%{transform:translate(3px,-1px);opacity:.4} 96%{transform:translate(-2px,1px);opacity:.5} }
  @keyframes glitch2 { 0%,84%,100%{transform:translate(0,0);opacity:0} 86%{transform:translate(4px,-2px);opacity:.45} 90%{transform:translate(-3px,1px);opacity:.4} 94%{transform:translate(2px,2px);opacity:.5} }

  .desc-box { background:var(--base-lighter); border:2px solid var(--accent-light); border-radius:10px; padding:1% 1.5%; font-size:1.2vw; line-height:1.4; color:var(--text); text-align:center; }

  /* 버튼: 클릭 가능하게, 커서는 pointer */
  .enter-btn {
    width:100%; padding:1.3% 0;
    font-family:var(--font-main,'Galmuri11'),sans-serif;
    font-size:1.3vw; color:var(--text);
    background:var(--base-accent);
    border:2px solid var(--accent);
    border-radius:12px;
    cursor:pointer;
    box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 var(--btn-shadow),0 4px 0 var(--accent);
    letter-spacing:1px;
    transition: transform 0.1s, box-shadow 0.1s;
    user-select:none;
  }
  .enter-btn:active { transform:translateY(3px); box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 var(--btn-shadow); }

  .status-bar { display:flex; justify-content:space-between; padding:0.7% 1.5%; font-family:'Galmuri9',sans-serif; font-size:1vw; color:var(--text-base); background:var(--base-darker); border-top:2px dashed var(--accent-light); }

  /* 태스크바 */
  .taskbar { position:absolute; left:0; right:0; bottom:0; height:5%; min-height:24px; max-height:38px; display:flex; align-items:center; justify-content:space-between; padding:0 2%; background:linear-gradient(180deg,var(--accent-base-soft) 0%,var(--accent) 100%); border-top:3px solid var(--base); font-family:'Galmuri9',sans-serif; font-size:1vw; color:#fff; z-index:6; }
  .taskbar .start-btn { display:flex; align-items:center; gap:4px; background:var(--base); color:var(--text); border:2px solid var(--accent); border-radius:8px; padding:2px 8px; font-size:1vw; }
  .taskbar .clock { background:var(--base); color:var(--text); border:2px solid var(--accent); border-radius:6px; padding:2px 6px; font-size:1vw; }

  /* 플로팅 창 */
  .float-win {
    position: absolute;
    background: var(--base);
    border: 3px solid var(--accent);
    border-radius: 14px;
    box-shadow: 0 6px 0 var(--win98-shadow1), 0 0 0 4px var(--base-light), 0 0 0 7px var(--accent);
    overflow: visible;
    z-index: 7;
    opacity: 0;
    transform: scale(0.8) translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(.2,1.4,.4,1);
    min-width: 80px;
    min-height: 60px;
    cursor: default;
  }
  .float-win.open {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  .float-win-inner { overflow: hidden; border-radius: 11px; width: 100%; height: 100%; display: flex; flex-direction: column; }
  .float-win .title-bar { font-size: 1vw; padding: 2px 6px; cursor: grab; flex-shrink:0; }
  .float-win.dragging .title-bar { cursor: grabbing; }
  .float-win.dragging { transition: none !important; }
  .float-win .float-photo {
    flex: 1;
    background-color: #E8E2D5;
    background-image: var(--fphoto, none);
    background-size: cover;
    background-position: center;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9vw; color: var(--text-soft); text-align: center; padding: 4px;
    font-family: 'Galmuri9', sans-serif;
    min-height: 40px;
    cursor: pointer;
  }
  .float-win input[type=file] { display: none; }
  .close-x { display:inline-flex; align-items:center; justify-content:center; width:14px; height:12px; background:var(--base); color:var(--accent); border-radius:4px; font-size:8px; cursor:pointer; }

  /* 리사이즈 핸들 */
  .resize-handle {
    position: absolute;
    right: -5px; bottom: -5px;
    width: 18px; height: 18px;
    cursor: se-resize;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  .resize-handle::after {
    content: '';
    display: block;
    width: 10px; height: 10px;
    border-right: 3px solid var(--accent);
    border-bottom: 3px solid var(--accent);
    border-radius: 0 0 4px 0;
    opacity: 0.7;
  }

  /* ─── 컨트롤 패널 ────────────────────────────────────────── */
  .panel { background:#F8F5EE; border:2px solid #BFC9C5; border-radius:12px; padding:12px; }
  .panel h2 { font-family:'Galmuri9',sans-serif; font-size:11px; letter-spacing:1px; color:#7C8A86; margin-bottom:8px; border-bottom:2px dashed #E0DACE; padding-bottom:6px; }
  .row { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .row label { flex:0 0 86px; font-size:11px; color:#5E6E72; }
  .row input[type=text], .row textarea, .row select { flex:1; min-width:90px; font-family:inherit; font-size:11px; padding:6px 8px; border:2px solid #BFC9C5; border-radius:8px; background:#fff; color:#5E6E72; }
  .row textarea { resize:vertical; min-height:32px; }
  .row input[type=color] { width:34px; height:28px; border:2px solid #BFC9C5; border-radius:6px; padding:0; background:#fff; }
  .row input[type=file] { flex:1; font-size:10px; }
  .check { display:flex; align-items:center; gap:6px; font-size:11px; }
  .bg-presets { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:8px; }
  .bg-presets .preset { height:36px; border-radius:8px; border:2px solid #BFC9C5; cursor:pointer; }
  .bg-presets .preset.active { border-color:#8A9A9C; box-shadow:0 0 0 2px #8A9A9C inset; }
  .export-btn { width:100%; padding:12px; margin-bottom:8px; font-family:'Galmuri11',sans-serif; font-size:13px; background:#EAE5D8; border:2px solid #8A9A9C; border-radius:12px; cursor:pointer; color:#5E6E72; box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 rgba(138,154,156,.25),0 4px 0 #8A9A9C; }
  .export-btn:active { transform:translateY(4px); box-shadow:none; }
  .export-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }
  .export-status { font-size:10px; color:#A4ADA8; text-align:center; min-height:14px; }
  .progress-bar { width:100%; height:8px; background:#E0DACE; border-radius:4px; margin-bottom:6px; display:none; overflow:hidden; }
  .progress-bar .fill { height:100%; background:#8A9A9C; border-radius:4px; width:0%; transition:width 0.15s; }

  /* 토글 버튼 스타일 */
  .toggle-row { display:flex; gap:6px; margin-top:6px; }
  .toggle-btn {
    flex:1; padding:8px 0;
    font-family:'Galmuri11',sans-serif; font-size:11px;
    background:#EAE5D8; border:2px solid #8A9A9C; border-radius:10px;
    cursor:pointer; color:#5E6E72;
    box-shadow:inset 1px 1px 0 #fff,inset -1px -1px 0 rgba(138,154,156,.25),0 3px 0 #8A9A9C;
  }
  .toggle-btn:active { transform:translateY(3px); box-shadow:none; }
</style>
</head>
<body>
<div class="app">
  <!-- 미리보기 -->
  <div class="preview-col">
    <h1>Window Maker — 커버 생성기</h1>
    <div class="cover-wrap">
      <div id="cover" style="
        --sky-top:#DCE8E6;--sky-mid:#C7DBDC;--sky-bottom:#A6C0CA;
        --base:#F3EFE6;--accent:#8A9A9C;--text:#5E6E72;
        --font-main:'Galmuri11';
        --base-light:#F6F3EB;--base-lighter:#F4F1E8;--base-darker:#E9E5DA;
        --accent-light:#D5DCDC;--accent-base:#BCC8C5;--accent-base-soft:#DCE2E0;
        --base-accent:#EDE7DA;--text-base:#79868A;--text-soft:#86948F;
        --bubble-bg:rgba(243,239,230,0.6);--bubble-border:rgba(243,239,230,0.8);
        --win98-shadow1:rgba(138,154,156,0.3);--btn-shadow:rgba(138,154,156,0.25);">
        <div class="fade-overlay"></div>
        <!-- 버블 -->
        <div class="bubble" style="left:8%;width:14px;height:14px;animation-duration:9s;animation-delay:0s;"></div>
        <div class="bubble" style="left:20%;width:10px;height:10px;animation-duration:7s;animation-delay:1.5s;"></div>
        <div class="bubble" style="left:35%;width:18px;height:18px;animation-duration:11s;animation-delay:3s;"></div>
        <div class="bubble" style="left:55%;width:12px;height:12px;animation-duration:8s;animation-delay:0.5s;"></div>
        <div class="bubble" style="left:70%;width:16px;height:16px;animation-duration:10s;animation-delay:2s;"></div>
        <div class="bubble" style="left:85%;width:11px;height:11px;animation-duration:9s;animation-delay:4s;"></div>
        <div class="bubble" style="left:92%;width:8px;height:8px;animation-duration:6s;animation-delay:1s;"></div>
        <!-- 타이틀 -->
        <div class="eden-title">
          <div class="en" id="title-en">Our Faded Eden</div>
          <div class="kr" id="title-kr">— 우리의 빛바랜 낙원 —</div>
        </div>
        <!-- 메인 윈도우 -->
        <div class="win98">
          <div class="title-bar">
            <div class="title-left"><span id="win-icon">🐚</span> <span id="win-title">Faded Eden</span></div>
            <div class="title-buttons"><span>_</span><span>□</span><span>x</span></div>
          </div>
          <div class="win98-body">
            <div class="photo-frame fx-faded" id="photo-frame"><div class="scan"></div></div>
            <div class="desc-box" id="desc-text">...빛이 점점 흐려집니다...<br>오래된 낙원으로 가라앉을까요?</div>
            <button class="enter-btn" id="btn-text">심해에 잠기시겠습니까?</button>
          </div>
          <div class="status-bar"><span id="status-left">● 준비됨</span><span id="status-right">faded 100%</span></div>
        </div>
        <!-- 플로팅 창 컨테이너 -->
        <div id="float-wins"></div>
        <!-- 태스크바 -->
        <div class="taskbar">
          <div class="start-btn" id="taskbar-text">🌊 시작</div>
          <div class="clock" id="clock">00:00</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 컨트롤 -->
  <div class="control-col">
    <div class="panel">
      <h2>🖼 배경</h2>
      <div class="bg-presets" id="bg-presets"></div>
      <div class="row"><label>직접 업로드</label><input type="file" id="bg-input" accept="image/*"></div>
      <div class="row"><label>그라디언트</label><input type="color" id="c-sky-top" value="#DCE8E6"><input type="color" id="c-sky-bottom" value="#A6C0CA"></div>
    </div>
    <div class="panel">
      <h2>📷 메인 사진 / 효과</h2>
      <div class="row"><label>이미지</label><input type="file" id="photo-input" accept="image/*"></div>
      <div class="check"><input type="checkbox" id="fx-faded" checked> <label for="fx-faded">빛바램 효과 (세피아)</label></div>
      <div class="check" style="margin-top:6px;"><input type="checkbox" id="fx-glitch"> <label for="fx-glitch">글리치 효과</label></div>
    </div>
    <div class="panel">
      <h2>🔤 글씨체</h2>
      <div class="row"><label>폰트</label>
        <select id="font-select">
          <option value="'Galmuri11'" selected>Galmuri11 (둥근 도트)</option>
          <option value="'Galmuri9'">Galmuri9 (작은 도트)</option>
          <option value="'Galmuri7'">Galmuri7 (작은 사각 도트)</option>
          <option value="'DungGeunMo'">DungGeunMo (둥근모꼴)</option>
        </select>
      </div>
    </div>
    <div class="panel">
      <h2>📝 문구</h2>
      <div class="row"><label>상단 영문</label><input type="text" id="t-title-en" value="Our Faded Eden"></div>
      <div class="row"><label>상단 한글</label><input type="text" id="t-title-kr" value="— 우리의 빛바랜 낙원 —"></div>
      <div class="row"><label>창 제목</label><input type="text" id="t-win-title" value="Faded Eden"></div>
      <div class="row"><label>설명 문구</label><textarea id="t-desc">...빛이 점점 흐려집니다...
오래된 낙원으로 가라앉을까요?</textarea></div>
      <div class="row"><label>버튼 문구</label><input type="text" id="t-btn" value="심해에 잠기시겠습니까?"></div>
      <div class="row"><label>작업표시줄</label><input type="text" id="t-taskbar" value="🌊 시작"></div>
      <div class="row"><label>상태표시줄</label><input type="text" id="t-status-l" value="● 준비됨"><input type="text" id="t-status-r" value="faded 100%"></div>
    </div>
    <div class="panel">
      <h2>🪟 떠다니는 사진 창</h2>
      <p style="font-size:10px;color:#A4ADA8;margin-bottom:8px;">타이틀바 드래그로 이동 · 오른쪽 하단 핸들로 크기 조절 · 클릭해서 사진 업로드</p>
      <div class="row"><label>창 개수</label>
        <select id="win-count">
          <option value="1">1개</option>
          <option value="2" selected>2개</option>
          <option value="3">3개</option>
          <option value="4">4개</option>
        </select>
      </div>
      <div class="toggle-row">
        <button class="toggle-btn" id="btn-open-all">▶ 모두 열기</button>
        <button class="toggle-btn" id="btn-close-all">■ 모두 닫기</button>
        <button class="toggle-btn" id="replay-anim">↺ 다시 재생</button>
      </div>
    </div>
    <div class="panel">
      <h2>🎨 색상</h2>
      <div class="row"><label>창 배경</label><input type="color" id="c-base" value="#F3EFE6"></div>
      <div class="row"><label>테두리</label><input type="color" id="c-accent" value="#8A9A9C"></div>
      <div class="row"><label>글자색</label><input type="color" id="c-text" value="#5E6E72"></div>
    </div>
    <div class="panel">
      <h2>💾 내보내기 — 1280×720</h2>
      <button class="export-btn" id="export-png">📷 PNG로 저장</button>
      <button class="export-btn" id="export-gif">🎞 GIF로 저장 (창 열림↔닫힘 루프)</button>
      <div class="progress-bar" id="progress-bar"><div class="fill" id="progress-fill"></div></div>
      <div class="export-status" id="export-status">보이는 그대로 1280×720으로 저장됩니다</div>
    </div>
  </div>
</div>

<script>
const cover = document.getElementById('cover');

// ── 상태 ──────────────────────────────────────────────────────
const state = {
  titleEn:'Our Faded Eden', titleKr:'— 우리의 빛바랜 낙원 —',
  winTitle:'Faded Eden', winIcon:'🐚',
  desc:'...빛이 점점 흐려집니다...\n오래된 낙원으로 가라앉을까요?',
  btnText:'심해에 잠기시겠습니까?', taskbar:'🌊 시작',
  statusL:'● 준비됨', statusR:'faded 100%',
  skyTop:'#DCE8E6', skyBottom:'#A6C0CA',
  base:'#F3EFE6', accent:'#8A9A9C', text:'#5E6E72',
  bgImage:null, photoImage:null,

function toDataURL(file, cb){ const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsDataURL(file); }
function mixHex(a, b, t){
  const pa=parseInt(a.slice(1),16), pb=parseInt(b.slice(1),16);
  const ar=(pa>>16)&255, ag=(pa>>8)&255, ab=pa&255;
  const br=(pb>>16)&255, bg=(pb>>8)&255, bb=pb&255;
  return '#'+[Math.round(ar+(br-ar)*t),Math.round(ag+(bg-ag)*t),Math.round(ab+(bb-ab)*t)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function hexRgb(h){ const v=parseInt(h.slice(1),16); return `${(v>>16)&255},${(v>>8)&255},${v&255}`; }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

const floatWinsWrap=document.getElementById('float-wins');
let floatWins=[];

const SLOTS=[
  {x:2, y:6}, {x:66, y:4},
  {x:1, y:48},{x:67, y:46}
];
const DEFAULT_W_PCT = 22;

function getCoverRect(){ return cover.getBoundingClientRect(); }

function buildFloatWindows(){
  floatWinsWrap.innerHTML=''; floatWins=[];
  while(state.floatPhotos.length < state.floatCount) state.floatPhotos.push(null);
  while(state.floatPositions.length < state.floatCount){
    const i=state.floatPositions.length;
    const s=SLOTS[i%SLOTS.length];
    state.floatPositions.push({x:s.x+(Math.random()*3-1.5), y:s.y+(Math.random()*3-1.5)});
  }
  while(state.floatSizes.length < state.floatCount){
    state.floatSizes.push({w: DEFAULT_W_PCT});
  }

  const titles=['Memory.jpg','Snapshot.png','Untitled','Picture'];
  for(let i=0; i<state.floatCount; i++){
    const win=document.createElement('div');
    win.className='float-win';
    const pos=state.floatPositions[i];
    const sz=state.floatSizes[i];
    win.style.left=pos.x+'%';
    win.style.top=pos.y+'%';
    win.style.width=sz.w+'%';

    win.innerHTML=`
      <div class="float-win-inner">
        <div class="title-bar">
          <div class="title-left">🖼 <span>${titles[i%titles.length]}</span></div>
          <div class="title-buttons"><span class="close-x">x</span></div>
        </div>
        <label class="float-photo">사진 없음<input type="file" accept="image/*"></label>
      </div>
      <div class="resize-handle" title="크기 조절"></div>
    `;
    floatWinsWrap.appendChild(win);

    const photoEl=win.querySelector('.float-photo');
    if(state.floatPhotos[i]){
      win.style.setProperty('--fphoto',`url("${state.floatPhotos[i]}")`);
      photoEl.childNodes[0].textContent='';
    }

    // 사진 업로드
    win.querySelector('input[type=file]').addEventListener('change',((idx)=>e=>{
      const f=e.target.files[0]; if(!f) return;
      toDataURL(f, url=>{
        state.floatPhotos[idx]=url;
        win.style.setProperty('--fphoto',`url("${url}")`);
        photoEl.childNodes[0].textContent='';
      });
    })(i));

    // 닫기
    win.querySelector('.close-x').addEventListener('click', ev=>{
      ev.stopPropagation();
      win.classList.remove('open');
      setTimeout(()=>win.remove(), 400);
      floatWins=floatWins.filter(w=>w.el!==win);
    });

    makeDraggable(win, i);
    makeResizable(win, i);
    floatWins.push({el:win, idx:i});
  }
}

function makeDraggable(win, idx){
  const tb=win.querySelector('.title-bar');
  let dragging=false, sx, sy, sl, st;
  const startDrag=e=>{
    if(e.target.closest('.close-x')) return;
    dragging=true; win.classList.add('dragging');
    const pt=e.touches?e.touches[0]:e;
    sx=pt.clientX; sy=pt.clientY;
    const pr=getCoverRect();
    sl=(parseFloat(win.style.left)||0);
    st=(parseFloat(win.style.top)||0);
    sl=sl/100*pr.width; st=st/100*pr.height;
    e.preventDefault();
  };
  const onMove=e=>{
    if(!dragging) return;
    const pt=e.touches?e.touches[0]:e;
    const pr=getCoverRect();
    const nx=(sl+pt.clientX-sx)/pr.width*100;
    const ny=(st+pt.clientY-sy)/pr.height*100;
    win.style.left=nx+'%'; win.style.top=ny+'%';
    if(state.floatPositions[idx]){ state.floatPositions[idx].x=nx; state.floatPositions[idx].y=ny; }
  };
  const stopDrag=()=>{ dragging=false; win.classList.remove('dragging'); };
  tb.addEventListener('mousedown', startDrag);
  tb.addEventListener('touchstart', startDrag, {passive:false});
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, {passive:false});
  window.addEventListener('mouseup', stopDrag);
  window.addEventListener('touchend', stopDrag);
}

function makeResizable(win, idx){
  const handle=win.querySelector('.resize-handle');
  let resizing=false, sx, sw;
  const startResize=e=>{
    resizing=true;
    const pt=e.touches?e.touches[0]:e;
    sx=pt.clientX;
    sw=win.getBoundingClientRect().width;
    e.preventDefault(); e.stopPropagation();
  };
  const onMove=e=>{
    if(!resizing) return;
    const pt=e.touches?e.touches[0]:e;
    const pr=getCoverRect();
    const newW=Math.max(60, Math.min(sw+(pt.clientX-sx), pr.width*0.55));
    const pct=newW/pr.width*100;
    win.style.width=pct+'%';
    if(state.floatSizes[idx]) state.floatSizes[idx].w=pct;
  };
  const stopResize=()=>{ resizing=false; };
  handle.addEventListener('mousedown', startResize);
  handle.addEventListener('touchstart', startResize, {passive:false});
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, {passive:false});
  window.addEventListener('mouseup', stopResize);
  window.addEventListener('touchend', stopResize);
}

// 창 열기/닫기
function openAllWindows(){
  if(!floatWinsWrap.children.length) buildFloatWindows();
  floatWins.forEach((w,i)=>{ setTimeout(()=>w.el.classList.add('open'), i*120); });
}
function closeAllWindows(){
  [...floatWinsWrap.querySelectorAll('.float-win')].forEach((w,i)=>{
    setTimeout(()=>w.classList.remove('open'), i*100);
  });
}

// ═══════════════════════════════════════════════════════════════
//  html2canvas 캡처 — 1280×720 정확하게
// ═══════════════════════════════════════════════════════════════
const EW=1280, EH=720;
const statusEl=document.getElementById('export-status');
const progressBar=document.getElementById('progress-bar');
const progressFill=document.getElementById('progress-fill');

async function captureCoverToCanvas(){
  const coverRect=cover.getBoundingClientRect();
  const coverW=coverRect.width;
  const coverH=coverRect.height;
  // 실제 해상도를 1280×720에 맞추는 스케일
  const scale=EW/coverW;

  const canvas=await html2canvas(cover,{
    useCORS:true,
    allowTaint:true,
    scale:scale,
    width:coverW,
    height:coverH,
    scrollX:0,
    scrollY:0,
    windowWidth:coverW,
    windowHeight:coverH,
    backgroundColor:null,
    logging:false,
    imageTimeout:15000,
    onclone:(doc,el)=>{
      el.style.borderRadius='0';
      el.style.overflow='hidden';
      el.style.position='relative';
      el.style.width=coverW+'px';
      el.style.height=coverH+'px';
    }
  });

  // 캔버스가 이미 EW×EH 비율로 나오지만, 명시적으로 리사이즈
  const out=document.createElement('canvas');
  out.width=EW; out.height=EH;
  const ctx=out.getContext('2d');
  ctx.drawImage(canvas,0,0,EW,EH);
  return out;
}

document.getElementById('export-png').onclick=async()=>{
  const btnP=document.getElementById('export-png');

  btnP.disabled=true; btnG.disabled=true;
  statusEl.textContent='PNG 캡처 중...';
  try{
    const canvas=await captureCoverToCanvas();
    canvas.toBlob(blob=>{
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='window-maker.png'; a.click();
      statusEl.textContent='✅ PNG 저장 완료! (1280×720)';
    },'image/png');
  }catch(err){ statusEl.textContent='오류: '+err.message; console.error(err); }
  btnP.disabled=false; btnG.disabled=false;
};

async function loadGifJs(){
  return new Promise((res,rej)=>{
    if(typeof GIF!=='undefined'){ res(); return; }
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js';

    document.head.appendChild(s);
  });
}

// ── 심플 GIF 인코더 (gif.js 로드 실패 시 폴백) ─────────────────
// Omggif 기반 간단 GIF 생성기
async function buildGifManually(frames){
  // frames: [{canvas, delay}]
  // 각 프레임을 팔레트 인덱스로 변환 후 GIF 바이트 스트림 생성
  const W=EW, H=EH;

  // GIF89a 헤더 직접 작성 (256색, 전역 팔레트)
  // 각 프레임별로 NeuQuant 양자화
  let chunks=[];
  const push=(arr)=>chunks.push(new Uint8Array(arr));

  // 헤더
  push([0x47,0x49,0x46,0x38,0x39,0x61]); // GIF89a
  // 논리 스크린 디스크립터
  push([W&0xFF,(W>>8)&0xFF, H&0xFF,(H>>8)&0xFF, 0xF7, 0, 0]); // 256색 팔레트

  // 첫 프레임에서 전역 팔레트 추출
  const ctx0=frames[0].canvas.getContext('2d');
  const imgData0=ctx0.getImageData(0,0,W,H);
  const pixels0=imgData0.data;

  // NeuQuant 양자화
  const nq=NeuQuant(Array.from(pixels0.filter((_,i)=>i%4!==3)), 10);
  nq.unbiasnet(); nq.inxbuild();
  const palette=nq.map();

  // 전역 팔레트 (256색 × 3 = 768 바이트)
  const palBytes=new Uint8Array(768);
  for(let i=0;i<palette.length;i++) palBytes[i]=palette[i];
  for(let i=palette.length;i<768;i++) palBytes[i]=0;
  chunks.push(palBytes);

  // Netscape 루프 확장 (무한반복)
  push([0x21,0xFF,0x0B,0x4E,0x45,0x54,0x53,0x43,0x41,0x50,0x45,0x32,0x2E,0x30,0x03,0x01,0x00,0x00,0x00]);

  for(let fi=0;fi<frames.length;fi++){
    const {canvas,delay}=frames[fi];
    const ctx=canvas.getContext('2d');
    const imgData=ctx.getImageData(0,0,W,H);
    const src=imgData.data;
    const d10=Math.round(delay/10); // cs 단위

    // 그래픽 제어 확장
    push([0x21,0xF9,0x04,0x00, d10&0xFF,(d10>>8)&0xFF, 0x00, 0x00]);

    // 이미지 디스크립터
    push([0x2C, 0,0, 0,0, W&0xFF,(W>>8)&0xFF, H&0xFF,(H>>8)&0xFF, 0x00]);

    // 인덱스 스트림 생성 (전역 팔레트 기준)
    const indices=new Uint8Array(W*H);
    for(let i=0;i<W*H;i++){
      const idx=i*4;
      indices[i]=nq.lookup(src[idx],src[idx+1],src[idx+2]);
    }

    // LZW 인코딩 (최소 코드 크기 8)
    const lzwData=lzwEncode(indices,256);
    push([0x08]);
    // LZW 데이터를 255바이트 블록으로 분할
    let pos=0;
    while(pos<lzwData.length){
      const blockLen=Math.min(255,lzwData.length-pos);
      push([blockLen]);
      chunks.push(lzwData.slice(pos,pos+blockLen));
      pos+=blockLen;
    }
    push([0x00]); // 블록 종료
  }

  push([0x3B]); // GIF 종료자

  // Blob 생성
  const totalLen=chunks.reduce((s,c)=>s+c.length,0);
  const merged=new Uint8Array(totalLen);
  let off=0;
  for(const c of chunks){ merged.set(c,off); off+=c.length; }
  return new Blob([merged],{type:'image/gif'});
}

// 간단한 LZW 인코더
function lzwEncode(indexStream,numColors){
  const minCodeSize=Math.max(2,Math.ceil(Math.log2(numColors)));
  const clearCode=1<<minCodeSize;
  const eoiCode=clearCode+1;

  let bits=[];
  let codeSz=minCodeSize+1;
  let nextCode=clearCode+2;
  let table={};

  function emitCode(code){
    for(let i=0;i<codeSz;i++) bits.push((code>>i)&1);
  }

  emitCode(clearCode);
  let str=''+indexStream[0];
  for(let i=1;i<indexStream.length;i++){
    const s=str+','+indexStream[i];
    if(table[s]!==undefined){ str=s; }
    else{
      emitCode(table[str]!==undefined?table[str]:parseInt(str));
      if(nextCode<4096){
        table[s]=nextCode++;
        if(nextCode>(1<<codeSz)&&codeSz<12) codeSz++;
      } else {
        emitCode(clearCode);
        table={}; codeSz=minCodeSize+1; nextCode=clearCode+2;
      }
      str=''+indexStream[i];
    }
  }
  emitCode(table[str]!==undefined?table[str]:parseInt(str));
  emitCode(eoiCode);

  // 비트를 바이트로 변환
  const bytes=[];
  for(let i=0;i<bits.length;i+=8){
    let b=0;
    for(let j=0;j<8;j++) if(bits[i+j]) b|=(1<<j);
    bytes.push(b);
  }
  return new Uint8Array(bytes);
}

      useGifJs=typeof GIF!=='undefined';
    }catch(e){ useGifJs=false; }

    const floatEls=[...floatWinsWrap.querySelectorAll('.float-win')];
    const wasOpen=floatEls.map(w=>w.classList.contains('open'));
    const TOTAL_FRAMES=20;
    const bubbleEls=[...cover.querySelectorAll('.bubble')];
    const bubbleOrigDelays=bubbleEls.map(b=>b.style.animationDelay);
    floatEls.forEach(w=>{ w.style.transition='none'; });

    const capturedFrames=[];

    for(let f=0; f<TOTAL_FRAMES; f++){
      const pct=f/TOTAL_FRAMES;
      statusEl.textContent=`프레임 캡처 중... ${f+1}/${TOTAL_FRAMES}`;
      progressFill.style.width=(pct*60)+'%';

      bubbleEls.forEach(b=>{
        const dur=parseFloat(b.style.animationDuration)||9;
        const offset=-(pct*dur*0.9)%dur;
        b.style.animationDelay=offset+'s';
      });

      if(f<4){
        floatEls.forEach(w=>{ w.style.opacity='0'; w.style.transform='scale(0.82) translateY(8px)'; });
      } else if(f<10){
        const phase=(f-4)/6;
        floatEls.forEach((w,i)=>{
          const lp=Math.max(0,Math.min(1,(phase*floatEls.length-i)/(floatEls.length*0.6)));
          w.style.opacity=String(lp);
          w.style.transform=`scale(${0.82+lp*0.18}) translateY(${8-lp*8}px)`;
        });
      } else if(f<16){
        floatEls.forEach(w=>{ w.style.opacity='1'; w.style.transform='scale(1) translateY(0)'; });
      } else {
        const phase=(f-16)/4;
        floatEls.forEach((w,i)=>{
          const lp=Math.min(1,(phase*floatEls.length-i*0.5)/floatEls.length);
          w.style.opacity=String(Math.max(0,1-lp));
          w.style.transform=`scale(${1-lp*0.18}) translateY(${lp*8}px)`;
        });
      }

      await wait(20);
      const c=await captureCoverToCanvas();
      const delay=f<4||f>=10&&f<16 ? 120 : 70;
      capturedFrames.push({canvas:c, delay});
    }

    // 원상복구
    floatEls.forEach((w,i)=>{
      w.style.transition='';
      if(wasOpen[i]) w.classList.add('open'); else w.classList.remove('open');
      w.style.opacity=''; w.style.transform='';
    });
    bubbleEls.forEach((b,i)=>{ b.style.animationDelay=bubbleOrigDelays[i]; });

    statusEl.textContent='GIF 인코딩 중... (잠시 기다려주세요)';
    progressFill.style.width='65%';

    let blob;
    if(useGifJs){
      // gif.js 사용
      try{
        const workerBlobUrl=await getWorkerBlobUrl();
        blob=await new Promise((res,rej)=>{
          const gif=new GIF({workers:2,quality:10,width:EW,height:EH,workerScript:workerBlobUrl,repeat:0});
          capturedFrames.forEach(({canvas,delay})=>gif.addFrame(canvas,{delay,copy:true}));
          gif.on('progress',p=>{ progressFill.style.width=(65+p*30)+'%'; });
          gif.on('finished',b=>{ URL.revokeObjectURL(workerBlobUrl); res(b); });
          gif.on('error',rej);
          gif.render();
        });
      }catch(e){
        // gif.js 실패 시 폴백
        blob=await buildGifManually(capturedFrames);
      }
    } else {
      // 폴백: 직접 GIF 인코딩
      blob=await buildGifManually(capturedFrames);
    }

    progressFill.style.width='100%';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='window-maker.gif';
    a.click();
    statusEl.textContent=`✅ GIF 저장 완료! (1280×720, ${TOTAL_FRAMES}프레임)`;
    setTimeout(()=>{ progressBar.style.display='none'; },2000);

  }catch(err){
    statusEl.textContent='오류: '+err.message;
    console.error(err);
    progressBar.style.display='none';
  }
  btnG.disabled=false; btnP.disabled=false;
};
</script>
</body>
</html>
